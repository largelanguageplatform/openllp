services:
  db:
    image: postgres:16-alpine
    # Not published to the host: the app reaches it on the internal network,
    # so an existing Postgres on your machine can never conflict. To inspect
    # the DB from the host, uncomment (localhost-only):
    #   ports:
    #     - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: platform
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U platform" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - openllp-network

  # Object storage for attachments (generated PDFs, uploads). Internal only.
  minio:
    image: minio/minio:latest
    command: server /data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - openllp-network

  # Creates the bucket once MinIO is up, then exits.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/openllp &&
      echo 'bucket ready'"
    networks:
      - openllp-network

  platform:
    image: openllp/platform:latest
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      # The dashboard has NO login (single-tenant bootstrap mode): anyone who
      # can reach this port has full access. Bind to a private interface
      # (e.g. "127.0.0.1:4000:4000") or front with your own auth proxy.
      - "4000:4000"
    environment:
      FLY_APP_NAME: "openllp"
      FLY_PRIVATE_IP: "platform"
      DATABASE_URL: "postgres://platform:localdev@db:5432/platform"
      # Local-dev throwaway key. Generate your own with: mix phx.gen.secret
      SECRET_KEY_BASE: "14c20cd611b0d160bd3d6cc8716862b66132ba1cb4bcf1ddfe509b08e10eca75"
      PHX_HOST: "localhost"
      USE_HTTP: "true"
      AUTO_MIGRATE: "true"
      # Object storage (the bundled MinIO).
      BUCKET_NAME: "openllp"
      AWS_ENDPOINT_URL_S3: "http://minio:9000"
      AWS_ACCESS_KEY_ID: "minioadmin"
      AWS_SECRET_ACCESS_KEY: "minioadmin"
      AWS_REGION: "us-east-1"
      # The document (PDF) generator. Remove this line to run without it —
      # the platform degrades gracefully and text-only test personas still work.
      PDF_AGENT_BASE_URL: "http://pdf-agent:8000"
    networks:
      - openllp-network

  # Generates realistic financial documents (invoices, W-2s, 1099-NECs,
  # receipts, bank statements) as PDFs for the chaos test personas. It asks
  # the platform for a signed upload URL, renders the PDF, and stores it in
  # the bucket. Needs an API key — see agents/pdf-agent/README.md for first-run setup.
  pdf-agent:
    build: ../agents/pdf-agent
    image: openllp/pdf-agent:latest
    depends_on:
      - platform
    environment:
      LLP_API_URL: "http://platform:4000/api/v1"
      LLP_API_KEY: "${PDF_AGENT_API_KEY:-}"
      OLLAMA_HOST: "${OLLAMA_HOST:-https://ollama.com}"
      OLLAMA_API_KEY: "${OLLAMA_API_KEY:-}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-gpt-oss:120b}"
    networks:
      - openllp-network

networks:
  openllp-network:
    # The platform release connects to Postgres over IPv6 (ECTO_IPV6=true).
    # Enable it here; no fixed subnet, so multiple stacks never collide.
    enable_ipv6: true
